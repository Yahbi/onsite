version: '3.8'

# ═══════════════════════════════════════════════════════════════════════════
# Onsite - Full Stack with Infrastructure
# Backend App + PostgreSQL + Redis + Elasticsearch + Monitoring
# ═══════════════════════════════════════════════════════════════════════════

networks:
  onsite:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  pgadmin_data:

services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "18000:8000"
    environment:
      - CENSUS_API_KEY=${CENSUS_API_KEY:-}
      - CENSUS_ENABLED=1
      - SOCRATA_APP_TOKEN=${SOCRATA_APP_TOKEN:-}
      - SOCRATA_ENABLED=1
      - FCC_ENABLED=1
      - USGS_ENABLED=1
      - DISABLE_REMOTE=0
      - REFRESH_INTERVAL_SEC=43200
      - SKIP_LA=0
      - SKIP_LB=1
      - USE_MASTER_ENRICH=1
      - ENRICH_ENABLED=1
      - AUTO_ENRICH_ON_SYNC=0
      - AUTO_ENRICH_BATCH_SIZE=100
      - CONTACT_CONF_THRESHOLD=${CONTACT_CONF_THRESHOLD:-0.6}
      - ENRICH_MAX_LOOKUPS=0
      - LEADS_RETURN_LIMIT=10000000
      - SOCRATA_LIMIT=50000
      - MAX_DAYS_OLD=30
      - GEOCODE_BUDGET=0
      - LA_ASSESSOR_INLINE=0
      - PROPERTYREACH_API_KEY=${PROPERTYREACH_API_KEY:-}
      - PROPERTYREACH_API_KEY_ALT=${PROPERTYREACH_API_KEY_ALT:-}
      - PROPERTYREACH_API_KEY_ALT2=${PROPERTYREACH_API_KEY_ALT2:-}
      - PROPERTYREACH_API_KEY_ALT3=${PROPERTYREACH_API_KEY_ALT3:-}
      - PROPERTYREACH_ENABLED=1
      - PROPERTYREACH_INLINE=0
      - PROPERTYREACH_MONTHLY_LIMIT=5000
      - ATTOM_API_KEY=${ATTOM_API_KEY:-}
      - ATTOM_RATE_LIMIT=100
      - YELP_INTENT_ENABLED=0
      - YELP_INTENT_INTERVAL=21600
      - MARKET_DB_PATH=/app/market.db
      - SHOVELS_API_KEY=${SHOVELS_API_KEY:-}
      - SHOVELS_ENABLED=1
      # Authentication
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-64-char-string}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS:-24}
      - AUTH_ENABLED=${AUTH_ENABLED:-0}
      # Billing
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      # Campaigns
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      # Rate limiting
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED:-1}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - RATE_LIMIT_PER_HOUR=${RATE_LIMIT_PER_HOUR:-2000}
      # Infrastructure connections
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=onsite
      - POSTGRES_USER=onsite
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-onsite_dev_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-onsite_redis}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - CORS_ORIGINS=http://localhost:18000,http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,http://localhost:8888,http://127.0.0.1:8888,null
    # FIX: Add DNS servers to resolve external API hosts
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    dns_opt:
      - ndots:1
      - timeout:2
      - attempts:3
    volumes:
      - ./backend/data_cache.json:/app/data_cache.json
      - ./backend/market.db:/app/market.db
      - ./backend/migrations:/app/migrations
      - ./backend/static:/app/static
    restart: unless-stopped
    networks:
      - onsite
    depends_on:
      - postgres
      - redis
      - elasticsearch
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ═══ PostgreSQL Database ═══
  postgres:
    image: postgres:15-alpine
    container_name: onsite-postgres
    environment:
      POSTGRES_DB: onsite
      POSTGRES_USER: onsite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onsite_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onsite"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - onsite
    restart: unless-stopped

  # ═══ Redis Cache ═══
  redis:
    image: redis:7-alpine
    container_name: onsite-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-onsite_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - onsite
    restart: unless-stopped

  # ═══ Elasticsearch Search Engine ═══
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: onsite-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - onsite
    restart: unless-stopped
    mem_limit: 1g

  # ═══ Prometheus Monitoring ═══
  prometheus:
    image: prom/prometheus:latest
    container_name: onsite-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - onsite
    restart: unless-stopped

  # ═══ Grafana Dashboards ═══
  grafana:
    image: grafana/grafana:latest
    container_name: onsite-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=redis-datasource
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - onsite
    restart: unless-stopped

  # ═══ pgAdmin (PostgreSQL GUI) ═══
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: onsite-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@onsite.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - onsite
    restart: unless-stopped
