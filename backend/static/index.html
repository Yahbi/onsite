/* Google OAuth popup-to-parent bridge */
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('auth') === 'google' && params.get('code') && window.opener) {
    fetch('/api/auth/google/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: params.get('code') })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.token) {
        window.opener.postMessage({
          type: 'google-auth-success',
          token: data.token,
          user: { email: '' }
        }, window.location.origin);
      } else {
        window.opener.postMessage({
          type: 'google-auth-error',
          error: data.detail || 'Code exchange failed'
        }, window.location.origin);
      }
      window.close();
    })
    .catch(function() {
      window.opener.postMessage({
        type: 'google-auth-error',
        error: 'Code exchange request failed'
      }, window.location.origin);
      window.close();
    });
    return;
  }
})();

const API_BASE = window.location.origin;
/* Global 401 handler — redirect to login on expired/invalid token */
function authFetch(url, opts) {
  const token = localStorage.getItem('onsite_token');
  if (token && token !== 'demo') {
    opts = opts || {};
    opts.headers = Object.assign({ 'Authorization': 'Bearer ' + token }, opts.headers || {});
  }
  return fetch(url, opts).then(r => {
    if (r.status === 401 && !url.includes('/api/auth/login') && !url.includes('/api/auth/register')) {
      localStorage.removeItem('onsite_token');
      localStorage.removeItem('onsite_user');
      window.location.href = '/login';
    }
    return r;
  });
}

/* Phase 1: Fetch lightweight map data FIRST (~30MB vs ~300MB) */
async function fetchMapData() {
  try {
    const t0 = performance.now();
    const res = await authFetch(API_BASE + '/api/leads/map');
    if (!res.ok) { console.error('[Onsite] Map API returned HTTP ' + res.status); return; }
    const data = await res.json();
    const pts = data.points || [];
    if (pts.length === 0) return;
    /* Decode compact array format: [id, lat, lng, pri_int, score, city, geocoded] */
    const _PRI_NAMES = ['hot', 'warm', 'med', 'cold'];
    const norm = new Array(pts.length);
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      norm[i] = {
        id: p[0] || ('M-' + String(i+1).padStart(5,'0')),
        lat: p[1],
        lng: p[2],
        pri: _PRI_NAMES[p[3]] || 'med',
        score: p[4] || 50,
        city: p[5] || '',
        _geocoded: p[6] === false ? false : (p[6] === 'city' ? 'city' : true),
        /* Stub fields so map component doesn't error on access */
        addr: '', st: '', zip: '', type: 'General', desc: '', val: 0,
        sqft: 0, perm: '', owner: '', phone: '', email: '',
        daysAgo: 0, filed: '', sold: false, gc: null, stage: 'new',
        history: [], apn: '', zone: '', occ: '', stories: 1, units: 1,
        lotSz: 0, inspDone: 0, inspTotal: INSP.length, source: 'API',
        year_built: '', contractor_phone: '', zoning: ''
      };
    }
    _mapPoints = norm.sort((a, b) => b.score - a.score);
    _serverClusters = data.clusters || [];
    _mapDataListeners.forEach(fn => fn(_mapPoints));
    console.log('[Onsite] Map data loaded: ' + _mapPoints.length + ' points in ' + Math.round(performance.now() - t0) + 'ms');
  } catch(e) {
    console.warn('[Onsite] Map data fetch failed:', e.message);
  }
}

/* Phase 2: Fetch full lead details in background (for tables, detail views) */
async function fetchRealLeads() {
  try {
    const t0 = performance.now();
    const res = await authFetch(API_BASE + '/api/leads?limit=500000');
    if (!res.ok) { throw new Error('[Onsite] API returned HTTP ' + res.status); }
    const data = await res.json();
    const leads = Array.isArray(data) ? data : data.leads || [];
    if (leads.length === 0) return;
    /* normalise API short names to match what the UI expects */
    const norm = leads.map((l, i) => ({
      id: l.id || ('API-' + String(i+1).padStart(5,'0')),
      addr: l.addr || l.address || '',
      city: l.city || '',
      st: l.st || l.state || '',
      zip: l.zip || '',

      lng: Number(l.lng) || 0,
      type: l.type || l.permit_type || 'General',
      desc: l.desc || l.description || DESC[l.type || l.permit_type] || '',
      score: Number(l.score || l.lead_score) || 50,
      pri: l.pri || l.temperature || (Number(l.score||l.lead_score)>=30?'hot':Number(l.score||l.lead_score)>=25?'warm':Number(l.score||l.lead_score)>=20?'med':'cold'),
      val: Number(l.val || l.valuation) || 0,
      sqft: Number(l.sqft) || 0,

      sold: !!l.sold,

function AdminPanel({ user }) {
  const [stats, setStats] = useState(null);
  const [activity, setActivity] = useState([]);
  const [loading, setLoading] = useState(true);
  const tok = localStorage.getItem('token');
  const headers = { 'Authorization': 'Bearer ' + tok };

  useEffect(() => {
    Promise.all([
      fetch('/api/health', { headers }).then(r => r.json()),
      fetch('/api/stats', { headers }).then(r => r.json()),
    ]).then(([health, st]) => {
      setStats({ health, stats: st });
      setLoading(false);
    }).catch(e => { console.error(e); setLoading(false); });

    fetch('/api/leads?limit=10&sort=created_at&order=desc', { headers })
      .then(r => r.json())
      .then(d => setActivity((d.leads || d.data || []).slice(0, 8)))
      .catch(() => {});
  }, []);

  if (loading) return h('div', { style: { padding: 40, textAlign: 'center', color: '#64748b' } }, 'Loading admin data...');

  const s = stats || {};
  const health = s.health || {};
  const st = s.stats || {};
  const totalLeads = st.total_leads || health.total_leads || 0;
  const activeSources = st.sources_active || 0;
  const withPhone = st.leads_with_phone || 0;
  const withEmail = st.leads_with_email || 0;
  const enrichRate = totalLeads > 0 ? Math.round((withPhone + withEmail) / totalLeads * 50) : 0;

  const card = (label, value, color, sub) => h('div', { style: { padding: 20, background: '#fff', borderRadius: 12, border: '1px solid #e2e8f0', minWidth: 200 } },

    h('div', { style: { fontSize: 32, fontWeight: 800, color: color, lineHeight: 1.2 } }, typeof value === 'number' ? value.toLocaleString() : value),

  }, label);

  return h('div', { style: { maxWidth: 1200, margin: '0 auto' } },
    h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 24 } },
      h('div', null,
        h('h2', { style: { fontSize: 22, fontWeight: 700, color: '#1e293b', margin: 0 } }, '\u2699\ufe0f Admin Dashboard'),
        h('div', { style: { fontSize: 12, color: '#64748b', marginTop: 4 } }, 'Logged in as ', h('strong', null, user.email), ' \u2014 ', health.status === 'healthy' ? '\u2705 System Healthy' : '\u26a0\ufe0f Check System')
      ),

    ),

      card('Total Leads', totalLeads, '#3b82f6', (st.active_leads || 0).toLocaleString() + ' active'),
      card('Active Sources', activeSources, '#8b5cf6', (st.sources_error || 0) + ' in error'),

      card('With Email', withEmail, '#f59e0b', Math.round(withEmail/Math.max(totalLeads,1)*100) + '% coverage'),
      card('Enrichment', enrichRate + '%', enrichRate > 20 ? '#10b981' : '#ef4444', 'contact coverage'),
